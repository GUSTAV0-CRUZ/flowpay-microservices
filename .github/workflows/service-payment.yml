name: Service Payment CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'service-payment/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'service-payment/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./service-payment

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './service-payment/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm run test --if-present

      # - name: Validate Docker Build
      #   run: docker build -t flowpay-inventory:test .